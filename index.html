<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/ceac3197e9.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>Sorteio</h1>
        <button id="botao-tema"><i  class="fa-solid fa-moon"></i></button>
    </header>
    <main>
        <section id="section-main">
            <h2 class="titulo">Sorteador</h1>
            <textarea name="" id="caixaOpcoes" placeholder=""></textarea>
            
            <button type="submit" id="sortear" class="button" >Sortear</button>

            <dialog id="modal">
                <h2>Resultado:</h2>
                <p id="resultado"></p>
                <button id="alterarSorteio" class="button">Alterar sorteio</button>
                
                <button id="novoSorteio" class="button">Novo sorteio</button>
            </dialog>
        </section> 
    </main>

    <script src="js/script.js"></script>
</body>
</html>
